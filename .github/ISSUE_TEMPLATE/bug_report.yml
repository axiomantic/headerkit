name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: input
    id: headerkit-version
    attributes:
      label: headerkit version
      description: "Output of: headerkit --version"
      placeholder: "0.8.2"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of: python --version"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: libclang-version
    attributes:
      label: libclang / LLVM version
      placeholder: "18.1.8"
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information (logs, screenshots, related issues).
    validations:
      required: false
